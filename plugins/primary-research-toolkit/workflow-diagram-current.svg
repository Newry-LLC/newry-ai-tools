<svg viewBox="0 0 1240 435" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" role="img">
  <title>Primary Research Toolkit — Consultant Workflow (current state, 2026-05-04)</title>
  <desc>Six-stage primary research workflow grouped into three phases (Plan; Source &amp; Prep; Execute &amp; Synthesize). Each stage shows what the consultant does and what the tool does, with status: Stage 6 (Codify &amp; synthesize) is built and Alta-tested via Interview Coding and Synthesis. Stages 1, 2, and 4 are planned stubs (Research Plan Design, Interview Guide Design). Stage 3 (Sourcing) and Stage 5 (Execution support) are not in current PRT scope; transcript cleaning from Stage 5 is absorbed into ICS pre-processing. Firm-knowledge band at the bottom names assets PRT draws on across projects.</desc>

  <!-- Title row -->
  <text x="25" y="26" font-size="16" font-weight="600" fill="rgb(31,31,31)">Primary Research Toolkit — Consultant Workflow</text>
  <text x="25" y="46" font-size="11" fill="rgb(102,112,133)">Six stages across three phases · at each stage: what the consultant does, what the tool does</text>
  <text x="1215" y="26" text-anchor="end" font-size="11" font-style="italic" fill="rgb(152,162,179)">Updated 2026-05-04</text>

  <!-- Phase bands -->
  <g>
    <rect x="25" y="68" width="380" height="22" rx="4" fill="rgb(255,255,255)" stroke="rgb(201,100,66)" stroke-width="1"/>
    <text x="215" y="84" text-anchor="middle" font-size="10.5" font-weight="700" fill="rgb(201,100,66)" letter-spacing="1.2">PLAN</text>

    <rect x="425" y="68" width="380" height="22" rx="4" fill="rgb(255,255,255)" stroke="rgb(201,100,66)" stroke-width="1"/>
    <text x="615" y="84" text-anchor="middle" font-size="10.5" font-weight="700" fill="rgb(201,100,66)" letter-spacing="1.2">SOURCE &amp; PREP</text>

    <rect x="825" y="68" width="380" height="22" rx="4" fill="rgb(255,255,255)" stroke="rgb(201,100,66)" stroke-width="1"/>
    <text x="1015" y="84" text-anchor="middle" font-size="10.5" font-weight="700" fill="rgb(201,100,66)" letter-spacing="1.2">EXECUTE &amp; SYNTHESIZE</text>
  </g>

  <!-- STAGE 1 — PLANNED (ICS Step 1 covers scope-locking today) -->
  <g>
    <rect x="25" y="105" width="185" height="215" rx="6" fill="white" stroke="rgb(152,162,179)" stroke-width="1" stroke-dasharray="4 3"/>
    <circle cx="45" cy="128" r="12" fill="rgb(152,162,179)"/>
    <text x="45" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="rgb(255,255,255)">1</text>
    <text x="65" y="132" font-size="12" font-weight="600" fill="rgb(31,31,31)">Kickoff &amp; context</text>
    <text x="39" y="152" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1">PLANNED · STUB</text>
    <text x="39" y="166" font-size="9" font-style="italic" fill="rgb(152,162,179)">ICS Step 1 covers this today</text>
    <text x="39" y="186" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">CONSULTANT</text>
    <text x="39" y="201" font-size="10.5" fill="rgb(31,31,31)">Brings in the analytical frame</text>
    <text x="39" y="215" font-size="10.5" fill="rgb(31,31,31)">and confirms scope.</text>
    <text x="39" y="237" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">TOOL</text>
    <text x="39" y="253" font-size="10.5" fill="rgb(31,31,31)">• Reads issue tree / SOW /</text>
    <text x="39" y="267" font-size="10.5" fill="rgb(31,31,31)">  kickoff deck</text>
    <text x="39" y="284" font-size="10.5" fill="rgb(31,31,31)">• Surfaces identified branches</text>
    <text x="39" y="301" font-size="10.5" fill="rgb(31,31,31)">• Locks scope on go-ahead</text>
  </g>

  <!-- STAGE 2 — PLANNED -->
  <g>
    <rect x="220" y="105" width="185" height="215" rx="6" fill="white" stroke="rgb(152,162,179)" stroke-width="1" stroke-dasharray="4 3"/>
    <circle cx="240" cy="128" r="12" fill="rgb(152,162,179)"/>
    <text x="240" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="rgb(255,255,255)">2</text>
    <text x="260" y="132" font-size="12" font-weight="600" fill="rgb(31,31,31)">Research plan</text>
    <text x="234" y="152" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1">PLANNED · STUB</text>
    <text x="234" y="186" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">CONSULTANT</text>
    <text x="234" y="201" font-size="10.5" fill="rgb(31,31,31)">Reviews and refines the plan.</text>
    <text x="234" y="237" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">TOOL</text>
    <text x="234" y="253" font-size="10.5" fill="rgb(31,31,31)">• Drafts branch priorities</text>
    <text x="234" y="270" font-size="10.5" fill="rgb(31,31,31)">• Suggests interviewee mix</text>
    <text x="234" y="284" font-size="10.5" fill="rgb(31,31,31)">  and sample size</text>
    <text x="234" y="301" font-size="10.5" fill="rgb(31,31,31)">• Recommends sourcing approach</text>
  </g>

  <!-- STAGE 3 — NOT IN PRT (consultant-driven) -->
  <g>
    <rect x="425" y="105" width="185" height="215" rx="6" fill="rgb(241,241,237)" stroke="rgb(180,180,170)" stroke-width="1"/>
    <circle cx="445" cy="128" r="12" fill="rgb(180,180,170)"/>
    <text x="445" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="rgb(255,255,255)">3</text>
    <text x="465" y="132" font-size="12" font-weight="600" fill="rgb(102,112,133)">Sourcing</text>
    <text x="439" y="152" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1">NOT IN PRT</text>
    <text x="439" y="166" font-size="9" font-style="italic" fill="rgb(152,162,179)">consultant-driven</text>
    <text x="439" y="186" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">CONSULTANT</text>
    <text x="439" y="201" font-size="10.5" fill="rgb(102,112,133)">Runs sourcing through</text>
    <text x="439" y="215" font-size="10.5" fill="rgb(102,112,133)">preferred channels.</text>
    <text x="439" y="237" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">TOOL</text>
    <text x="439" y="253" font-size="10.5" fill="rgb(102,112,133)">No PRT support today.</text>
    <text x="439" y="273" font-size="10" font-style="italic" fill="rgb(152,162,179)">Sourcing stable feeds other</text>
    <text x="439" y="287" font-size="10" font-style="italic" fill="rgb(152,162,179)">sub-skills as firm-knowledge</text>
    <text x="439" y="301" font-size="10" font-style="italic" fill="rgb(152,162,179)">input.</text>
  </g>

  <!-- STAGE 4 — PLANNED -->
  <g>
    <rect x="620" y="105" width="185" height="215" rx="6" fill="white" stroke="rgb(152,162,179)" stroke-width="1" stroke-dasharray="4 3"/>
    <circle cx="640" cy="128" r="12" fill="rgb(152,162,179)"/>
    <text x="640" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="rgb(255,255,255)">4</text>
    <text x="660" y="132" font-size="12" font-weight="600" fill="rgb(31,31,31)">Guide &amp; file system</text>
    <text x="634" y="152" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1">PLANNED · STUB</text>
    <text x="634" y="186" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">CONSULTANT</text>
    <text x="634" y="201" font-size="10.5" fill="rgb(31,31,31)">Schedules interviews;</text>
    <text x="634" y="215" font-size="10.5" fill="rgb(31,31,31)">sets up project files.</text>
    <text x="634" y="237" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">TOOL</text>
    <text x="634" y="253" font-size="10.5" fill="rgb(31,31,31)">• Drafts persona-specific</text>
    <text x="634" y="267" font-size="10.5" fill="rgb(31,31,31)">  interview guides</text>
    <text x="634" y="284" font-size="10.5" fill="rgb(31,31,31)">• Builds in probing follow-ups</text>
    <text x="634" y="301" font-size="10.5" fill="rgb(31,31,31)">• Branch-coverage matrix</text>
  </g>

  <!-- STAGE 5 — NOT IN PRT (held; transcript cleaning absorbed into ICS) -->
  <g>
    <rect x="825" y="105" width="185" height="215" rx="6" fill="rgb(241,241,237)" stroke="rgb(180,180,170)" stroke-width="1"/>
    <circle cx="845" cy="128" r="12" fill="rgb(180,180,170)"/>
    <text x="845" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="rgb(255,255,255)">5</text>
    <text x="865" y="132" font-size="12" font-weight="600" fill="rgb(102,112,133)">Execution support</text>
    <text x="839" y="152" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1">NOT IN PRT</text>
    <text x="839" y="166" font-size="9" font-style="italic" fill="rgb(152,162,179)">held; cleaning absorbed</text>
    <text x="839" y="186" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">CONSULTANT</text>
    <text x="839" y="201" font-size="10.5" fill="rgb(102,112,133)">Runs the interviews.</text>
    <text x="839" y="237" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">TOOL</text>
    <text x="839" y="253" font-size="10.5" fill="rgb(102,112,133)">Live follow-ups and post-</text>
    <text x="839" y="267" font-size="10.5" fill="rgb(102,112,133)">memos held.</text>
    <text x="839" y="285" font-size="10" font-style="italic" fill="rgb(152,162,179)">Transcript cleaning absorbed</text>
    <text x="839" y="299" font-size="10" font-style="italic" fill="rgb(152,162,179)">into ICS pre-processing.</text>
  </g>

  <!-- STAGE 6 — BUILT -->
  <g>
    <rect x="1020" y="105" width="185" height="215" rx="6" fill="white" stroke="rgb(64,144,96)" stroke-width="1.5"/>
    <circle cx="1040" cy="128" r="12" fill="rgb(64,144,96)"/>
    <text x="1040" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="rgb(255,255,255)">6</text>
    <text x="1060" y="132" font-size="12" font-weight="600" fill="rgb(31,31,31)">Codify &amp; synthesize</text>
    <text x="1034" y="152" font-size="9" font-weight="700" fill="rgb(64,144,96)" letter-spacing="1">BUILT · ALTA-TESTED</text>
    <text x="1034" y="186" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">CONSULTANT</text>
    <text x="1034" y="201" font-size="10.5" fill="rgb(31,31,31)">Owns the narrative;</text>
    <text x="1034" y="215" font-size="10.5" fill="rgb(31,31,31)">signs off on findings.</text>
    <text x="1034" y="237" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">TOOL</text>
    <text x="1034" y="253" font-size="10.5" fill="rgb(31,31,31)">• Mode 1: per-interview cards</text>
    <text x="1034" y="270" font-size="10.5" fill="rgb(31,31,31)">• Mode 2: SoF-style Roll-up</text>
    <text x="1034" y="287" font-size="10.5" fill="rgb(31,31,31)">• Coverage, gaps,</text>
    <text x="1034" y="301" font-size="10.5" fill="rgb(31,31,31)">  contradictions, OTIT</text>
  </g>

  <!-- Arrows between cards -->
  <g stroke="rgb(152,162,179)" fill="rgb(152,162,179)">
    <line x1="212" y1="213" x2="217" y2="213" stroke-width="1.5"/>
    <polygon points="217,209 220,213 217,217"/>
    <line x1="407" y1="213" x2="422" y2="213" stroke-width="1.5"/>
    <polygon points="422,209 425,213 422,217"/>
    <line x1="612" y1="213" x2="617" y2="213" stroke-width="1.5"/>
    <polygon points="617,209 620,213 617,217"/>
    <line x1="807" y1="213" x2="822" y2="213" stroke-width="1.5"/>
    <polygon points="822,209 825,213 822,217"/>
    <line x1="1012" y1="213" x2="1017" y2="213" stroke-width="1.5"/>
    <polygon points="1017,209 1020,213 1017,217"/>
  </g>

  <!-- Firm knowledge band -->
  <g>
    <rect x="25" y="345" width="1180" height="75" rx="6" fill="white" stroke="rgb(229,229,224)" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="39" y="367" font-size="9" font-weight="700" fill="rgb(152,162,179)" letter-spacing="1.2">FIRM KNOWLEDGE IN PLAY</text>
    <text x="39" y="386" font-size="11" fill="rgb(31,31,31)">Sourcing stable (internal experts and vetted vendors) · guide templates (canonical structures by persona) · past research archives (prior Roll-ups, pattern library) · segmentation framework (canonical interviewee types).</text>
    <text x="39" y="406" font-size="10" font-style="italic" fill="rgb(152,162,179)">Some assets exist (segmentation framework lives in references/); others are placeholders for now.</text>
  </g>

  <!-- Status legend (below firm knowledge band, bottom right) -->
  <g>
    <rect x="900" y="425" width="9" height="9" fill="white" stroke="rgb(64,144,96)" stroke-width="1.5"/>
    <text x="914" y="433" font-size="9.5" fill="rgb(102,112,133)">Built</text>
    <rect x="945" y="425" width="9" height="9" fill="white" stroke="rgb(152,162,179)" stroke-dasharray="3 2"/>
    <text x="959" y="433" font-size="9.5" fill="rgb(102,112,133)">Planned (stub)</text>
    <rect x="1042" y="425" width="9" height="9" fill="rgb(241,241,237)" stroke="rgb(180,180,170)"/>
    <text x="1056" y="433" font-size="9.5" fill="rgb(102,112,133)">Not in PRT</text>
  </g>
</svg>
